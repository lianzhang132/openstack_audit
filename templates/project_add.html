{% extends "base.html" %}

{% block title %}添加项目 - OpenStack云平台审计系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>➕ 添加项目</h1>
    <a href="{{ url_for('project_list') }}" class="btn btn-outline">← 返回列表</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" class="form">
            <div class="form-group">
                <label for="name">项目名称 <span class="required">*</span></label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="输入项目名称">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="owner">项目负责人</label>
                    <input type="text" id="owner" name="owner" class="form-control" placeholder="负责人姓名">
                </div>
                
                <div class="form-group">
                    <label for="department">所属部门</label>
                    <input type="text" id="department" name="department" class="form-control" placeholder="部门名称">
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">项目描述</label>
                <textarea id="description" name="description" class="form-control" rows="3" placeholder="描述项目用途、背景等"></textarea>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">💾 保存</button>
                <a href="{{ url_for('project_list') }}" class="btn btn-outline">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
